name: fitpro

services:
  db:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-fitpro}_db
    restart: unless-stopped
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME:-fitpro_db}
      MYSQL_USER: ${DB_USER:-fitpro_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-fitpro_pwd}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-fitpro_root}
    volumes:
      - fitpro_mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - fitpro_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-fitpro_root}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-fitpro}_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-19414}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${DB_USER:-fitpro_user}:${DB_PASSWORD:-fitpro_pwd}@db:3306/${DB_NAME:-fitpro_db}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_string}
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 120
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT:-18414}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fitpro_net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-fitpro}_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-18414}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fitpro_net

volumes:
  fitpro_mysql_data:

networks:
  fitpro_net:
    driver: bridge
